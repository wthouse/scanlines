<footer class="site-footer">
  <div class="footer-inner container">
    <div class="footer-content">
      {{- $isProfileHome := and (eq (site.Params.scanlines.homepage | default "blog") "profile") .IsHome -}}
      {{- if not $isProfileHome -}}
        {{- partial "social-icons.html" . -}}
      {{- end -}}

      <div class="footer-meta">
        <p class="copyright">
          &copy; {{ now.Year }} {{ .Site.Params.author | default .Site.Title }}
        </p>
        <p class="powered-by">
          Powered by <a href="https://gohugo.io/" rel="noopener">Hugo</a>
          &bull; Theme: <a href="https://github.com/wthouse/scanlines" rel="noopener">Scanlines</a>
        </p>
      </div>

    </div>
  </div>
</footer>
